; ============================================================================
;   AEROSENSE — PlatformIO Build Configuration
;   Target: ESP32-S3 DevKitC-1 + OV2640 Camera Payload
; ============================================================================

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Serial monitor baud rate (must match Serial.begin() in main.cpp)
monitor_speed = 115200

; --- PSRAM Configuration ---
; The ESP32-S3 DevKitC-1 ships with either Quad SPI or Octal SPI PSRAM.
; "qio_opi" = Quad-SPI flash + Octal-SPI PSRAM (most common S3 DevKitC-1).
; Change to "qio_qspi" if your specific module uses Quad-SPI PSRAM instead.
board_build.arduino.memory_type = qio_opi

build_flags =
    -DBOARD_HAS_PSRAM              ; Enable PSRAM driver at compile time
    -DCONFIG_SPIRAM_SUPPORT=1      ; ESP-IDF PSRAM support flag

    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

; --- Library Dependencies ---
lib_deps =
    esp32-camera                   ; Espressif OV2640/OV5640 camera driver

monitor_port = /dev/ttyACM1
upload_port = /dev/ttyACM1

